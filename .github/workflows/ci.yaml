name: CI
on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      should_run_tests: ${{ steps.filter.outputs.code == 'true' || steps.filter.outputs.ci == 'true' }}
      should_run_lint: ${{ steps.filter.outputs.lint == 'true' || steps.filter.outputs.ci == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Check changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**.py'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'docker-compose*.yaml'
              - 'requirements*.txt'
            lint:
              - '**.py'
              - '**.yaml'
              - '**.yml'
              - 'Dockerfile'
            ci:
              - '.github/workflows/*.yaml'
              - '.github/workflows/*.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.should_run_lint == 'true'
    uses: ./.github/workflows/lint.yaml

  build-and-test:
    needs: [changes, lint]
    if: needs.changes.outputs.should_run_tests == 'true'
    uses: ./.github/workflows/build-and-test.yaml

  CI-status:
    needs: [changes, build-and-test, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report CI result
        run: |
          TESTS_RESULT="${{ needs.build-and-test.result }}"
          LINT_RESULT="${{ needs.lint.result }}"

          if [[ "$LINT_RESULT" == "failure" || "$LINT_RESULT" == "cancelled" ]]; then
            echo "CI failed: lint did not pass"
            exit 1
          fi

          if [[ "$TESTS_RESULT" == "failure" || "$TESTS_RESULT" == "cancelled" ]]; then
            echo "CI failed: build-and-test did not pass"
            exit 1
          fi

          echo "CI passed"