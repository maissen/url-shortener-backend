name: Lint

on:
  pull_request:
    paths:
      - "**.py"
      - "**.yaml"
      - "**.yml"
      - "Dockerfile"
    branches:
      - main

jobs:
  lint-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files