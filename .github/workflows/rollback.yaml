name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback (staging or production)"
        required: true
        type: choice
        options:
          - staging
          - production

      image_tag:
        description: "Image tag from ECR to rollback to"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ vars[format('{0}_URL', github.event.inputs.environment)] }}

    env:
      ENV_UPPER: ${{ toUpper(github.event.inputs.environment) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        run: |
          aws ecr describe-images \
            --repository-name ${{ vars.IMAGE_NAME }} \
            --image-ids imageTag=${{ github.event.inputs.image_tag }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars[format('{0}_TASK_DEF_FAMILY', env.ENV_UPPER)] }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME }}
          image: ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}

      - name: Deploy rollback to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars[format('{0}_ECS_SERVICE', env.ENV_UPPER)] }}
          cluster: ${{ vars[format('{0}_ECS_CLUSTER', env.ENV_UPPER)] }}
          wait-for-service-stability: true