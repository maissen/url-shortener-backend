name: CD-new

on:
  push:
    branches:
      - main
      - 'releases/v*'

  release:
    types:
      - published

jobs:
  decide-env:
    needs: changes
    runs-on: ubuntu-latest

    outputs:
      env: ${{ steps.decide.outputs.env }}
      env_upper: ${{ steps.decide.outputs.env_upper }}
      image_tag: ${{ steps.decide.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Decide environment
        id: decide
        run: |
          SHA_SHORT=${GITHUB_SHA::8}

          # set default to QA
          ENV="qa"
          ENV_UPPER="QA"
          IMAGE_TAG="$SHA_SHORT"

          # staging
          if [[ "${GITHUB_REF_NAME}" == releases/v* ]]; then
            VERSION=${GITHUB_REF_NAME#releases/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            ENV="staging"
            ENV_UPPER="STAGING"
            IMAGE_TAG="${VERSION}-${SHA_SHORT}"
          fi

          # prod
          if [[ "${GITHUB_EVENT_NAME}" == "release" && "${GITHUB_EVENT_ACTION}" == "published" ]]; then
            ENV="prod"
            ENV_UPPER="PROD"
            IMAGE_TAG="${{ github.event.release.tag_name }}"
          fi

          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "env_upper=$ENV_UPPER" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create draft release (Staging only)
        if: startsWith(github.ref_name, 'releases/v')
        uses: release-drafter/release-drafter@v5
        with:
          tag: ${{ steps.decide.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    uses: ./.github/workflows/build-and-test.yaml

  cd:
    name: Deploy to ${{ needs.decide-env.outputs.env }}
    needs: [ci, decide-env]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_TAG: ${{ needs.decide-env.outputs.image_tag }}

    environment:
      name: ${{ needs.decide-env.outputs.env }}
      url: ${{ vars[format('{0}_URL', needs.decide-env.outputs.env_upper)] }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:latest

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars[format('{0}_TASK_DEF_FAMILY', needs.decide-env.outputs.env_upper)] }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME }}
          image: ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars[format('{0}_ECS_SERVICE', needs.decide-env.outputs.env_upper)] }}
          cluster: ${{ vars[format('{0}_ECS_CLUSTER', needs.decide-env.outputs.env_upper)] }}
          wait-for-service-stability: true