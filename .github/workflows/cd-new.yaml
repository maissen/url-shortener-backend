name: CD-new

on:
  push:
    branches:
      - main
      - 'releases/v*'

  release:
    types:
      - published

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.filter.outputs.deployable }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deployable:
              - '**.py'
              - 'Dockerfile'
              - 'requirements*.txt'

  decide-env:
    needs: changes
    if: needs.changes.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.prod.outputs.env || steps.staging.outputs.env || steps.qa.outputs.env }}
      img_tag: ${{ steps.prod.outputs.img_tag || steps.staging.outputs.img_tag || steps.qa.outputs.img_tag }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: set default env to QA
        id: qa
        run: |
          echo "sha_short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "env=qa" >> $GITHUB_OUTPUT
          echo "img_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: set env to Staging
        if: startsWith(github.ref_name, 'releases/v')
        id: staging
        run: |
          VERSION=${GITHUB_REF_NAME#releases/}
          echo "env=staging" >> $GITHUB_OUTPUT
          echo "img_tag=${VERSION}-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: set env to Prod
        if: github.event_name == 'release' && github.event.action == 'published'
        id: prod
        run: |
          echo "env=prod" >> $GITHUB_OUTPUT
          echo "img_tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Create draft release (Staging only)
        if: startsWith(github.ref_name, 'releases/v')
        uses: release-drafter/release-drafter@v5
        with:
          tag: ${{ steps.staging.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    needs: changes
    if: needs.changes.outputs.deployable == 'true'
    uses: ./.github/workflows/build-and-test.yaml

  cd:
    name: Deploy to ${{ needs.decide-env.outputs.env }}
    needs: [ci, decide-env]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      ENV: ${{ needs.decide-env.outputs.env }}
      IMAGE_TAG: ${{ needs.decide-env.outputs.img_tag }}

    environment:
      name: ${{ env.ENV }}
      url: ${{ vars[format('{0}_URL', env.ENV_UPPER)] }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.image_tag }}
            ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:latest

      - name: Normalize ENV to uppercase
        run: echo "ENV_UPPER=${ENV^^}" >> $GITHUB_ENV

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars[format('{0}_TASK_DEF_FAMILY', env.ENV_UPPER)] }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME }}
          image: ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars[format('{0}_ECS_SERVICE', env.ENV_UPPER)] }}
          cluster: ${{ vars[format('{0}_ECS_CLUSTER', env.ENV_UPPER)] }}
          wait-for-service-stability: true