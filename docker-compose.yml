services:
  api:
    build: .
    image: flask-backend:latest
    container_name: flask-backend

    # Load all variables from .env (git-ignored); override individual
    # values with the 'environment' block below if needed.
    env_file:
      - .env

    environment:
      APP_ENV: production   # override a single key if desired

    ports:
      - "${PORT:-8080}:${PORT:-8080}"

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8080}/health')"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s

    restart: unless-stopped
