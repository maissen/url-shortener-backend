services:
  api:
    build: .
    image: url-shortener-image
    container_name: url-shortener-backend
    env_file:
      - .env

    ports:
      - "${PORT:-80}:3000"

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-80}/health')"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s

    restart: unless-stopped
