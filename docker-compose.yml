services:

  # ── DynamoDB Local ───────────────────────────────────────────────────────────
  dynamo:
    image: amazon/dynamodb-local:latest
    container_name: url-shortener-dynamo
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    ports:
      - "8000:8000"
    volumes:
      - dynamo_data:/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8000 && echo -e 'GET / HTTP/1.0\\r\\n' >&3 && cat <&3 | grep -q HTTP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Table bootstrap (runs once, then exits) ──────────────────────────────────
  dynamo-init:
    image: amazon/aws-cli:latest
    container_name: url-shortener-dynamo-init
    depends_on:
      dynamo:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "aws dynamodb create-table --table-name url-shortener --attribute-definitions AttributeName=code,AttributeType=S --key-schema AttributeName=code,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamo:8000 || aws dynamodb describe-table --table-name url-shortener --endpoint-url http://dynamo:8000"
    restart: "no"

  # ── Flask API ────────────────────────────────────────────────────────────────
  api:
    build: .
    image: url-shortener-image
    container_name: url-shortener-backend
    depends_on:
      dynamo:
        condition: service_healthy
      dynamo-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamo:8000
      DYNAMODB_TABLE: url-shortener
      APP_ENV: development
    ports:
      - "${PORT:-80}:3000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  dynamo_data: