services:

  # ── DynamoDB Local ───────────────────────────────────────────────────────────
  dynamo:
    image: amazon/dynamodb-local:latest
    container_name: url-shortener-dynamo
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    ports:
      - "8000:8000"
    volumes:
      - dynamo_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/shell/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Table bootstrap (runs once, then exits) ──────────────────────────────────
  dynamo-init:
    image: amazon/aws-cli:latest
    container_name: url-shortener-dynamo-init
    depends_on:
      dynamo:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      aws dynamodb create-table
        --table-name url-shortener
        --attribute-definitions AttributeName=code,AttributeType=S
        --key-schema AttributeName=code,KeyType=HASH
        --billing-mode PAY_PER_REQUEST
        --endpoint-url http://dynamo:8000
    restart: "no"

  # ── Flask API ────────────────────────────────────────────────────────────────
  api:
    build: .
    image: url-shortener-image
    container_name: url-shortener-backend
    depends_on:
      dynamo:
        condition: service_healthy
      dynamo-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Override SSM lookup — point boto3 straight at DynamoDB Local
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamo:8000
      # Bypass SSM entirely in local dev (app.py falls back to this env var)
      DYNAMODB_TABLE: url-shortener
      APP_ENV: development
    ports:
      - "${PORT:-80}:3000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  dynamo_data: